# =====================================================
#  AI Training Logger - Application Configuration
# =====================================================

# Database (SQLite file path — relative to project root)
db.url=jdbc:sqlite:aitraining_log.db
db.driver=org.sqlite.JDBC

# Connection Pool settings
db.pool.maxConnections=10
db.pool.timeout=30000

# Logger Settings
logger.app.name=AITrainingLogger
logger.version=1.0.0

# Report output directory
report.output.dir=reports/
